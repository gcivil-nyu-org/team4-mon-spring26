{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h2 class="mb-4">Chat with {{ other_user.username }}</h2>

        <div class="card mb-4" style="height: 400px; overflow-y: auto;">
            <div class="card-body">
                {% for msg in chat_messages %}
                    <div class="d-flex {% if msg.sender == user %}justify-content-end{% else %}justify-content-start{% endif %} mb-3">
                        <div class="card {% if msg.sender == user %}bg-primary text-white{% else %}bg-light{% endif %}" style="max-width: 75%;">
                            <div class="card-body p-2">
                                <p class="mb-0">{{ msg.content }}</p>
                                <small class="{% if msg.sender == user %}text-white-50{% else %}text-muted{% endif %} d-block text-end mt-1" style="font-size: 0.7em;">
                                    {{ msg.created_at|date:"H:i" }}
                                </small>
                            </div>
                        </div>
                    </div>
                {% empty %}
                    <div class="text-center text-muted">No messages yet. Start the conversation!</div>
                {% endfor %}
            </div>
        </div>

        <form method="post" class="mt-3">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Send Message</button>
        </form>

        <a href="{% url 'communities:inbox' %}" class="btn btn-outline-secondary mt-3">Back to Inbox</a>
    </div>
</div>
{% endblock %}
