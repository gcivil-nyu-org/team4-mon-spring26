name: CI/CD Pipeline - AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
      - develop

jobs:
  # =========================================================
  # 1. CONTINUOUS INTEGRATION (CI): Run automated tests
  # =========================================================
  integrate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Tests
        run: |
          # We don't provide DATABASE_URL here, so settings.py
          # automatically falls back to sqlite3 for testing!
          python manage.py test
        env:
          DJANGO_SECRET_KEY: "test-secret-key-123"
          DEBUG: "True"
          ALLOWED_HOSTS: "*"

  # =========================================================
  # 2. CONTINUOUS DEPLOYMENT (CD): Push to AWS
  # =========================================================
  deploy-to-aws:
    needs: integrate-and-test
    runs-on: ubuntu-latest
    # Deploy when pushing/merging to develop OR main
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create Deployment Package
        run: zip -r deploy.zip . -x '*.git*' '*venv*' '*.pytest_cache*' '__pycache__/*'

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APP_NAME }}
          environment_name: ${{ secrets.EB_ENV_NAME }}
          version_label: "github-action-${{ github.sha }}"
          region: ${{ secrets.AWS_REGION }}
          deployment_package: deploy.zip
